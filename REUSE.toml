version = 1

# .gitignore stays in hawkeye's default excludes (not re-included via a negation) and is
# licensed here instead of via an inline header. Annotation paths are matched exactly, so
# each nested .gitignore (e.g. .serena/) needs its own entry, not just the root one.
[[annotations]]
path = [".gitignore", ".serena/.gitignore"]
SPDX-FileCopyrightText = "© 2023 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# The favicon is a graphic asset, not a text file hawkeye can header inline.
[[annotations]]
path = "docs/assets/favicon.svg"
SPDX-FileCopyrightText = "© 2023 Tyler Nivin"
SPDX-License-Identifier = "MIT"


# Files that can't carry an SPDX header (no comment syntax / generated). Everything
# else gets a real header from hawkeye (see .config/licenserc.toml).
[[annotations]]
path = ["**/*.json", "**/.vscode/*", "**/.python-version", "uv.lock"]
SPDX-FileCopyrightText = "© 2023 Tyler Nivin"
SPDX-License-Identifier = "MIT"
